name: Minecraft CI/CD

# Any push to main fires the whole pipeline
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

    # Generates the config file on the fly 
      - name: Create .env file
        run: |
          echo "DOCKERDATA=/root/data" >> .env
          echo "PORT=25565" >> .env
          echo "SERVER_NAME=prod-server" >> .env

      # downloads the Minecraft jar and builds the Docker image right there in the cloud runner.
      - name: Run build script
        run: chmod +x build.sh && ./build.sh

      # Exports the entire Docker image into a single file
      - name: Save image
        run: docker save minecraft-server > minecraft.tar

      # Copies the docker-compose.yml, .env and minecraft.tar file to the server
      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "docker-compose.yml"
          target: "/root/"

      - name: Copy .env to server
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: ".env"
          target: "/root/"

      - name: Copy image tar to server
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "minecraft.tar"
          target: "/root/"

      # SSH's in and restarts the container with the new image
      - name: Deploy container
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /root

            # Load env vars (DOCKERDATA, SERVER_NAME, PORT) from the .env file
            set -a
            . ./.env
            set +a

            # Make sure the bind-mount target files/dirs exist on the server.
            mkdir -p "$DOCKERDATA/minecraft/$SERVER_NAME/world"
            touch "$DOCKERDATA/minecraft/$SERVER_NAME/server.properties"
            echo '[]' > "$DOCKERDATA/minecraft/$SERVER_NAME/ops.json"
            echo '[]' > "$DOCKERDATA/minecraft/$SERVER_NAME/whitelist.json"

            docker load < minecraft.tar

            # Use docker-compose if available, otherwise fall back to `docker compose`.
            if command -v docker-compose >/dev/null 2>&1; then
              DC="docker-compose"
            else
              DC="docker compose"
            fi

            $DC down || true
            $DC up -d
